    <path stroke="#b45309" d="M 27.42 8.44 A 24 24 0 0 1 36.58 8.44"/>
    <path d="M 45.42 12.10 A 24 24 0 0 1 51.90 18.58"/>
    <path d="M 55.56 27.42 A 24 24 0 0 1 55.56 36.58"/>
    <path d="M 51.90 45.42 A 24 24 0 0 1 45.42 51.90"/>
    <path d="M 36.58 55.56 A 24 24 0 0 1 27.42 55.56"/>
    <path d="M 18.58 51.90 A 24 24 0 0 1 12.10 45.42"/>
    <path d="M 8.44 36.58 A 24 24 0 0 1 8.44 27.42"/>
    <path d="M 12.10 18.58 A 24 24 0 0 1 18.58 12.10"/>
  </g>
  <circle cx="32" cy="32" r="5" fill="#211d18"/>
</svg>
