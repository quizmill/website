<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- quizmill mark: an eight-paddle mill wheel that is also a progress
       loop — one segment golden, the turn of the wheel. Paddles carry a
       clear gap so they read distinctly even at favicon size. -->
